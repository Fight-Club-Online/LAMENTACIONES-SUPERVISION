# =============================================================
# SERVER CONFIGURATION
# =============================================================
spring.application.name=LAMENTACIONES-SUPERVISION
server.port=8085

# =============================================================
# DATABASE (Basado en tu MONGO_URI de producción)
# =============================================================
spring.data.mongodb.uri=${MONGO_URI:mongodb+srv://pacoandres03_db_user:admin@blueteam.biz5ysx.mongodb.net/SUPERVISION?retryWrites=true&w=majority}

# =============================================================
# MESSAGING (RabbitMQ - Configurado para el host 'rabbitmq' de tu red Docker)
# =============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# =============================================================
# SECURITY (JWT - Debe coincidir exactamente para validar sesiones)
# =============================================================
jwt.secret=${JWT_SECRET:ARSW_SECRET_OSCAR_JUAN_SANTIAGO_GAME}
# 1 hora de expiración según tu archivo (3600000 ms)
jwt.expiration=${JWT_EXPIRATION:3600000}

# =============================================================
# CORS (Usando la URL de Vercel de tu frontend)
# =============================================================
app.allowed-origins=${FRONTEND_ORIGINS:https://lamentaciones-frontend.vercel.app}

# =============================================================
# MONITORING
# =============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never